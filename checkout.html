<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleShop | Checkout</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-content">
        <h1 class="logo">SimpleShop</h1>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a class="active cart-link" href="checkout.html" aria-label="Cart">🛒 Cart</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section-space">
      <h2>Checkout</h2>
      <p class="section-intro">Enter your delivery and payment details to complete your order.</p>

      <form class="checkout-form">
        <section class="form-card">
          <h3>Delivery Information</h3>
          <label>Full Name<input type="text" placeholder="John Doe" required /></label>
          <label>Email<input type="email" placeholder="john@example.com" required /></label>
          <label>Phone<input type="tel" placeholder="+1 555 123 4567" required /></label>
          <label>Address<input type="text" placeholder="123 Main Street" required /></label>
          <label>City<input type="text" placeholder="New York" required /></label>
          <label>ZIP Code<input type="text" placeholder="10001" required /></label>
        </section>

        <section class="form-card">
          <h3>Payment Details</h3>
          <label>Cardholder Name<input type="text" placeholder="John Doe" required /></label>
          <label>Card Number<input type="text" placeholder="1234 5678 9012 3456" required /></label>
          <div class="split-fields">
            <label>Expiry Date<input type="text" placeholder="MM/YY" required /></label>
            <label>CVV<input type="password" placeholder="123" required /></label>
          </div>
          <label>Payment Method
            <select required>
              <option value="">Select method</option>
              <option>Credit Card</option>
              <option>Debit Card</option>
              <option>Cash on Delivery</option>
            </select>
          </label>
          <button type="submit" class="btn">Place Order</button>
        </section>
      </form>
    </main>

    <footer class="footer">
      <div class="container"><p>&copy; 2026 SimpleShop. All rights reserved.</p></div>
    </footer>
  </body>
</html>
